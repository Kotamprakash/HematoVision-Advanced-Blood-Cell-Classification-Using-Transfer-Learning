<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #f4f6f8;
            margin-top: 50px;
        }

        .box {
            background: white;
            padding: 30px;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        img {
            border-radius: 10px;
        }

        button {
            padding: 10px 20px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
        }

        button:hover {
            background: #c0392b;
        }
    </style>

</head>
<body>

<div class="box">

    <h2>Prediction Result</h2>

    <img src="{{ image_url }}" width="300">

    <h3>Predicted Blood Cell Type:</h3>

    <h2>{{ prediction }}</h2>

    <!-- Goes back to home.html -->
    <a href="{{ url_for('home') }}">
        <button>Upload Another Image</button>
    </a>

</div>

</body>
</html>
